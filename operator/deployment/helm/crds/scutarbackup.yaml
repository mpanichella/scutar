apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scutarbackups.scutar.io
spec:
  group: scutar.io
  scope: Namespaced
  names:
    kind: ScutarBackup
    listKind: ScutarBackupList
    plural: scutarbackups
    singular: scutarbackup
    shortNames: ["sb"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["mode", "source", "destinationConnectionRef"]
              properties:
                mode:
                  type: string
                  enum: ["snapshot", "mirror"]
                schedule:
                  type: string
                  description: "5-field cron expression. If absent, runs once."
                suspend:
                  type: boolean
                source:
                  type: object
                  required: ["pvcName"]
                  properties:
                    pvcName: { type: string }
                    path:    { type: string }
                    include:
                      type: array
                      items: { type: string }
                    exclude:
                      type: array
                      items: { type: string }
                destinationConnectionRef:
                  type: object
                  required: ["name"]
                  properties:
                    name: { type: string }
                destinationPath:
                  type: string
                encryption:
                  type: object
                  properties:
                    enabled: { type: boolean }
                    passwordSecretRef:
                      type: object
                      properties:
                        name: { type: string }
                        key:  { type: string }
                retention:
                  type: object
                  properties:
                    keepLast:    { type: integer, minimum: 0 }
                    keepDaily:   { type: integer, minimum: 0 }
                    keepWeekly:  { type: integer, minimum: 0 }
                    keepMonthly: { type: integer, minimum: 0 }
                    keepYearly:  { type: integer, minimum: 0 }
                jobTemplate:
                  type: object
                  properties:
                    backoffLimit:           { type: integer, minimum: 0 }
                    activeDeadlineSeconds:  { type: integer, minimum: 0 }
                    ttlSecondsAfterFinished:{ type: integer, minimum: 0 }
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      additionalPrinterColumns:
        - name: Mode
          type: string
          jsonPath: .spec.mode
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: Status
          type: string
          jsonPath: .status.condition
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
