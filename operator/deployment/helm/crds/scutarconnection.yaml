apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scutarconnections.scutar.io
spec:
  group: scutar.io
  scope: Namespaced
  names:
    kind: ScutarConnection
    listKind: ScutarConnectionList
    plural: scutarconnections
    singular: scutarconnection
    shortNames: ["sc"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["type"]
              properties:
                type:
                  type: string
                  enum: ["local", "s3", "azure", "gcs", "sftp"]
                s3:
                  type: object
                  properties:
                    bucket:    { type: string }
                    region:    { type: string }
                    endpoint:  { type: string }
                    forcePathStyle: { type: boolean }
                azure:
                  type: object
                  properties:
                    account:   { type: string }
                    container: { type: string }
                gcs:
                  type: object
                  properties:
                    bucket: { type: string }
                sftp:
                  type: object
                  properties:
                    host: { type: string }
                    port: { type: integer }
                    user: { type: string }
                local:
                  type: object
                  properties:
                    path: { type: string }
                credentialsSecretRef:
                  type: object
                  properties:
                    name: { type: string }
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
