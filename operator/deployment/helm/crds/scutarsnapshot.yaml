apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scutarsnapshots.scutar.io
spec:
  group: scutar.io
  scope: Namespaced
  names:
    kind: ScutarSnapshot
    listKind: ScutarSnapshotList
    plural: scutarsnapshots
    singular: scutarsnapshot
    shortNames: ["ss"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            status:
              type: object
              required: ["backupRef", "snapshotId", "createdAt"]
              properties:
                backupRef:      { type: string }
                snapshotId:     { type: string }
                createdAt:      { type: string, format: date-time }
                bytesRead:      { type: integer, minimum: 0 }
                bytesWritten:   { type: integer, minimum: 0 }
                filesProcessed: { type: integer, minimum: 0 }
      additionalPrinterColumns:
        - name: Backup
          type: string
          jsonPath: .status.backupRef
        - name: SnapshotID
          type: string
          jsonPath: .status.snapshotId
        - name: Created
          type: date
          jsonPath: .status.createdAt
