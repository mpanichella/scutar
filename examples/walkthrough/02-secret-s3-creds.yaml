# Paso 2: Secret con las credenciales del bucket destino.
#
# Reemplazar <ACCESS_KEY> y <SECRET_KEY> por las credenciales reales antes de
# aplicar. NO commitear este archivo con valores reales.
#
# Permisos IAM mínimos sobre el bucket:
#   - s3:ListBucket
#   - s3:GetObject, s3:PutObject, s3:DeleteObject
---
apiVersion: v1
kind: Secret
metadata:
  name: prod-s3-creds
  namespace: scutar
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "<ACCESS_KEY>"
  AWS_SECRET_ACCESS_KEY: "<SECRET_KEY>"
