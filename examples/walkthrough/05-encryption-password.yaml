# Paso 5: Secret con el password de encriptación del repo.
#
# El password se usa SOLO en mode: snapshot con encryption.enabled: true.
# Si vas a probar mirror o snapshot sin encriptación, podés saltearte este
# paso (y borrar la sección `encryption` del paso 6).
#
# IMPORTANTE: anotá este password en un lugar seguro. SIN EL PASSWORD NO
# HAY RESTORE — ni Anthropic, ni vos, ni AWS pueden recuperar los datos.
# Es la garantía del modelo de zero-knowledge.
---
apiVersion: v1
kind: Secret
metadata:
  name: walkthrough-backup-password
  namespace: scutar
type: Opaque
stringData:
  password: "cambia-esto-por-un-password-largo-y-aleatorio-32-chars-min"
